# ------------------------------------------------------------------------------
# Deployment (Stage 4).
#
# Purpose:
# - Runs the application as a set of identical pods.
# - Shows best practices: labels, resource requests/limits, health probes.
# ------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-learning
  labels:
    app.kubernetes.io/name: devops-learning
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: devops-learning
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devops-learning
    spec:
      containers:
        - name: app
          # Update this image to your registry when you start pushing images in CI/CD.
          image: devops-learning-springboot:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: devops-learning-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

