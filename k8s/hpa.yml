# ------------------------------------------------------------------------------
# HorizontalPodAutoscaler (Stage 4).
#
# Purpose:
# - Scales the Deployment based on CPU utilization.
#
# Notes:
# - Requires metrics-server.
# - Tweak targets once you understand your app's real behavior.
# ------------------------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-learning
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-learning
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

