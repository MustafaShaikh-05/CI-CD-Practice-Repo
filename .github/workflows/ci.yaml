name: ci pipeline

on:
  push:
    branches:
      - main
jobs:
  upload:

    runs-on: ubuntu-latest

    steps:
      - name: clone project
        uses: actions/checkout@v4
      
      - name: Verify it
        run: pwd
      
      - name: List Files of Proejct
        run: ls -la

      - name: Download Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      
      - name: verify Java
        run: java -version

      - name: verify Maven
        run: mvn -version
      
      - name: Run Maven
        run: mvn clean package
          
      - name: Save Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: target/*.jar
